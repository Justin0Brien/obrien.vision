# Site settings
title: Justin O'Brien
email: justin@obrien.vision
description: >-
  Data Visualization • Analysis • Insights. 
  Exploring employment dynamics, career transitions, and economic trends through interactive visualizations and evidence-based research.
baseurl: ""
url: "https://obrien.vision"

# Build settings
markdown: kramdown
# theme: jekyll-theme-modernist
# theme: minima # Uncomment to use a basic theme if you prefer
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  # Local-only plugins (e.g., jekyll-admin) are configured in _config.local.yml

# Jekyll settings
permalink: /:year/:month/:day/:title/

# Social media and contact
github_username: Justin0Brien

# Modernist theme settings
show_downloads: false
is_project_page: false

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - QUICK-REFERENCE.md
  - docs/
  - uploads/
  - scripts/
  - bin/
  - gutenberg/
  - _backup_posts/
  - _gallery/
  - _projects/
  - broadband.html
  - llm-workflow.html
  - images.html
  - illusions.md
  - visualizations.md
  - fix_visualizations_layout.py
  - migrate_illusions.py
  - requirements.txt
  - start-dev.sh
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - venv/
  - .git/
  - .gitignore
  - README.md

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Justin O'Brien"
  - scope:
      path: ""
      type: "visualizations"
    values:
      layout: "visualization"
      author: "Justin O'Brien"
  - scope:
      path: ""
      type: "illusions"
    values:
      layout: "illusion"
      author: "Justin O'Brien"

# Collections
collections:
  visualizations:
    output: true
    permalink: /:collection/:name/
  illusions:
    output: true
    permalink: /:collection/:name/

 # Note: jekyll_admin settings moved to _config.local.yml for local-only use
